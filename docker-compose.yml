services:

  postgres:
    image: postgres:16

    container_name: postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: analytics

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio

    container_name: minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data
  
  airflow-init:
    build: ./airflow

    user: root

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres:5432/airflow
      AIRFLOW__WEBSERVER__COOKIE_NAME: "airflow_session"

    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

    depends_on:
      postgres:
        condition: service_started

  airflow-scheduler:
    build: ./airflow
    user: root
    restart: unless-stopped
  
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres:5432/airflow
      AIRFLOW__WEBSERVER__COOKIE_NAME: "airflow_session"
  
    command: scheduler
  
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
      - ./superset/superset_exports:/opt/airflow/superset_exports
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-webserver:
    build: ./airflow
    user: root
    restart: unless-stopped
  
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres:5432/airflow
      AIRFLOW__WEBSERVER__COOKIE_NAME: "airflow_session"
  
    command: webserver
  
    ports:
      - "8080:8080"
  
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
      - /var/run/docker.sock:/var/run/docker.sock
  
  superset:
    image: apache/superset:3.1.0
    environment:
      SUPERSET_SECRET_KEY: "your-secret-key-change-me"
    ports:
      - "8088:8088"
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/superset_exports:/app/superset_exports
    command: >
      bash -c "superset db upgrade && superset fab create-admin --username admin --firstname Admin --lastname User --email admin@admin.com --password admin && superset init && superset run -h 0.0.0.0 -p 8088"
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data:
